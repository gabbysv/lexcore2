<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LexCore</title>
  <script>
    // Get the current path and redirect properly
    var path = window.location.pathname;
    var repo = '/lexcore2';
    
    // If we're at a subpage, redirect to index with the path as a parameter
    if (path.indexOf(repo) === 0) {
      path = path.slice(repo.length);
    }
    
    window.location.replace(
      window.location.origin + repo + '/?redirect=' + encodeURIComponent(path)
    );
  </script>
</head>
<body></body>
</html>
